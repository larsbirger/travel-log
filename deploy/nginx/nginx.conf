server {
    listen 80;
    server_name localhost;

    # 1. Serve the simple web form directly
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # 2. Reverse proxy API calls to the backend container
    location /api/ {
        # Podman resolves "app" automatically to your backend container
        proxy_pass http://app:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}